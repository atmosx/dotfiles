[mistral-devstral]
options.endpoint_url = https://litellm.internal.metro.healthcare/v1/chat/completions
options.auth_type = bearer
options.token_file_path = ~/.config/litellm.token
options.model = mistral-devstral-2512
options.temperature = 0.2
options.request_timeout = 60
options.stream = 1

[mistral-large]
options.endpoint_url = https://litellm.internal.metro.healthcare/v1/chat/completions
options.auth_type = bearer
options.token_file_path = ~/.config/litellm.token
options.model = mistral-large-latest
options.temperature = 0.7
options.request_timeout = 60
options.stream = 1
